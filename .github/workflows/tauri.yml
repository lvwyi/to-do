name: BuildWindowsApp

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
            todo-app/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('todo-app/src-tauri/Cargo.lock') }}

      - name: Install deps
        shell: bash
        run: npm ci || npm install
        working-directory: ./todo-app

      - name: Build frontend
        shell: bash
        run: npm run build
        working-directory: ./todo-app

      - name: Tauri build
        shell: bash
        run: npx tauri build --verbose
        working-directory: ./todo-app
        timeout-minutes: 30

      - name: Upload installer
        shell: bash
        run: ls -la src-tauri/target/release/bundle/nsis/
        working-directory: ./todo-app

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: todosetup
          path: todo-app/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
