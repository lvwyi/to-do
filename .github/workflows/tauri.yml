name: BuildWindowsApp

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install deps
        shell: pwsh
        run: cd todo-app; npm ci --prefer-offline --no-audit 2>&1 || npm install --prefer-offline --no-audit 2>&1

      - name: Build frontend
        shell: pwsh
        run: cd todo-app; npm run build 2>&1

      - name: Tauri build
        shell: pwsh
        run: cd todo-app; npx tauri build 2>&1
        timeout-minutes: 60

      - name: List output files
        shell: pwsh
        run: Get-ChildItem -Recurse todo-app/src-tauri/target/release/bundle/

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: todosetup
          path: todo-app/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
